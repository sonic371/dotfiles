#################################
#             Shadows           #
#################################

shadow = true;
shadow-radius = 15;
shadow-opacity = 0.8;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-color = "#000000";


#################################
#           Fading              #
#################################

fading = true;

fade-in-step = 0.02;
fade-out-step = 0.02;
fade-delta = 3;


#################################
#   Transparency / Opacity      #
#################################

frame-opacity = 0.9;


#################################
#           Corners             #
#################################

corner-radius = 3;


#################################
#            Blur               #
#################################

blur: {
  method = "dual_kawase";
  strength = 5;
  deviation = 1.0;
}
blur-kern = "3x3box";

blur-background = true;
blur-background-frame = true;


#################################
#       General Settings        #
#################################

backend = "glx";
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
dithered-present = false;


#################################
#       Window Rules            #
#################################

# Rules to disable blur for most windows, enable only for Obsidian/LibreWolf
rules: ({
  match = "window_type = 'normal'";
  blur-background = false;
  shadow = true;
}, {
  # Obsidian
  match = "class_g = 'obsidian' || class_g = 'Obsidian'";
  opacity = 0.92;
  blur-background = true;
  shadow = true;
}, {
  # LibreWolf
  match = "class_g = 'librewolf'";
  opacity = 0.94;
  blur-background = true;
  shadow = true;
}, {
  # LibreWolf in fullscreen mode (e.g., YouTube videos) - make opaque
  match = "class_g = 'librewolf' && fullscreen";
  opacity = 1.0;
  blur-background = false;
  shadow = false;
}, {
  # Anki
  match = "class_g = 'Anki'";
  opacity = 0.92;
  blur-background = true;
  shadow = true;
}, {
  match = "window_type = 'popup_menu' || window_type = 'dropdown_menu' || window_type = 'menu'";
  blur-background = false;
  shadow = false;
}, {
  # Webull Desktop
  match = "class_g = 'Webull Desktop'";
  opacity = 0.92;
  blur-background = false;
  shadow = true;
}, {
  # Think or Swim
  match = "class_g = 'java-lang-Thread'";
  opacity = 0.92;
  blur-background = false;
  shadow = true;
});

