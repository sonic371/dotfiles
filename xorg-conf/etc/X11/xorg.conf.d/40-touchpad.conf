Section "InputClass"
    Identifier "Touchpad"
    MatchIsTouchpad "on"
    Driver "libinput"

    # Tap-to-click
    Option "Tapping" "on"
    # Natural scrolling
    Option "NaturalScrolling" "on"
    # Middle button via two-finger or three-finger tap
    Option "MiddleEmulation" "on"
    # Cursor acceleration
    Option "AccelSpeed" "0.2"
    # Smooth scroll distance
    Option "ScrollPixelDistance" "20"
EndSection

Section "InputClass"
    Identifier "TrackPoint"
    MatchProduct "TPPS/2 Synaptics TrackPoint"
    Driver "libinput"

    # TrackPoint scroll distance
    Option "ScrollPixelDistance" "30"
    # Slow down cursor movement
    Option "AccelSpeed" "-0.5"
EndSection
